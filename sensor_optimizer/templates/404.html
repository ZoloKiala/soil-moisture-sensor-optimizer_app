{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page not found</title>

  <!-- Favicon -->
  <link rel="icon" href="{% static 'sensor_optimizer/favicon.ico' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'sensor_optimizer/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'sensor_optimizer/favicon-16x16.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'sensor_optimizer/apple-touch-icon.png' %}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ background:#f8fafc; }
    .card{ border-radius:18px; }
    .brand{ font-weight:900; letter-spacing:.2px; }
    .muted{ color: rgba(15,23,42,.72); }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5 text-center">
            <div class="mb-3">
              <img src="{% static 'sensor_optimizer/favicon-32x32.png' %}" alt="logo" width="32" height="32" class="me-1">
              <span class="brand">Soil Moisture Sensor Optimization</span>
            </div>

            <h1 class="fw-bold mb-2">404 — Page not found</h1>
            <p class="muted mb-4">
              The page you’re looking for doesn’t exist, or the link is incorrect.
            </p>

            <div class="d-flex flex-wrap gap-2 justify-content-center">
              <a class="btn btn-success" href="{% url 'sensor_optimizer:sensor_optimizer' %}">
                Back to optimizer
              </a>
              <button class="btn btn-outline-secondary" onclick="history.back()">Go back</button>
            </div>

            <div class="mt-4 small text-muted">
              Tip: check the URL or return to the optimizer.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
