<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page not found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ background:#f8fafc; }
    .card{ border-radius:16px; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5 text-center">
            <div class="mb-3">
              <span class="badge rounded-pill text-bg-success px-3 py-2">🌱 Soil Moisture Sensor Optimizer</span>
            </div>

            <h1 class="fw-bold mb-2">404 — Page not found</h1>
            <p class="text-muted mb-4">
              The page you requested doesn’t exist (or the link is wrong).
            </p>

            <div class="d-flex flex-wrap gap-2 justify-content-center">
              <a class="btn btn-success" href="{% url 'sensor_optimizer:sensor_optimizer' %}">
                Back to optimizer
              </a>
              <button class="btn btn-outline-secondary" onclick="history.back()">Go back</button>
            </div>

            <div class="mt-4 small text-muted">
              If you typed the URL manually, double-check it.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
