{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 — Server error</title>

<!-- Favicon -->
  <link rel="icon" href="{% static 'sensor_optimizer/favicon.ico' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'sensor_optimizer/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'sensor_optimizer/favicon-16x16.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'sensor_optimizer/apple-touch-icon.png' %}">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ background:#f8fafc; }
    .card{ border-radius:16px; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5 text-center">
            <div class="mb-3">
              <span class="badge rounded-pill text-bg-danger px-3 py-2">⚠️ Server error</span>
            </div>

            <h1 class="fw-bold mb-2">500 — Something went wrong</h1>
            <p class="text-muted mb-4">
              The server hit an error while processing your request. Please try again.
            </p>

            <div class="d-flex flex-wrap gap-2 justify-content-center">
              <button class="btn btn-primary" onclick="location.reload()">Retry</button>
              <a class="btn btn-success" href="{% url 'sensor_optimizer:sensor_optimizer' %}">
                Back to optimizer
              </a>
            </div>

            <div class="mt-4 small text-muted">
              If this keeps happening, check the Railway logs for the traceback.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
